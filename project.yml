# The single source of truth for the Xcode project.
# App.xcodeproj is a build product: regenerate with `Scripts/gen.sh`, never edit it.
name: App
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
configFiles:
  Debug: Config/Shared.xcconfig
  Release: Config/Shared.xcconfig
packages:
  AppModules:
    path: Packages/AppModules
targets:
  App:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: AppModules
        product: AppFeature
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
  Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: App
      - package: AppModules
        product: AppFeature
  UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: App
schemes:
  App:
    build:
      targets:
        App: all
    test:
      targets:
        - Tests
        - UITests
